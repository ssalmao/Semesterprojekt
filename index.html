<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Universe</title>

  <link rel="stylesheet" href="https://use.typekit.net/yxq3dzq.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
  
<body>
  <header class="navbar">
   <div class="logo">
     <img src="img/IM2_Logo_Avatar 1.png" alt="Avatar Universe Logo">
   </div>

   <select class="seasonfilter">
     <option value="">select season</option>
     <option value="seasonOne">season 1</option>
     <option value="seasonTwo">season 2</option>
     <option value="seasonThree">season 3</option>
   </select>
  </header>

  <main>
   <section class="hero">
      <img src="img/Hero.png" alt="Background Avatar World">
   </section>

   <div id="content">
    <img src="img/IM2_Uebertitel_Avatar 1.png" alt="Episodes Overview" class="hidden"> 
    <img src="img/Avatar Start.png" alt="Avatar Aang points to dropdown menu">
   </div>
  </main>

   <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
   <script src="js/script.js" type="module"></script>
</body>
</html>
